  const c = config[cand];
  const t = Math.min(1, pct / maxPct[cand]);
  const [r1,g1,b1]=hexToRgb(c.color1), [r2,g2,b2]=hexToRgb(c.color2), [r3,g3,b3]=hexToRgb(c.color3);
  let r,g,b;
  if (t<0.5){const u=t/0.5;r=Math.round(r1+(r2-r1)*u);g=Math.round(g1+(g2-g1)*u);b=Math.round(b1+(b2-b1)*u);}
  else{const u=(t-0.5)/0.5;r=Math.round(r2+(r3-r2)*u);g=Math.round(g2+(g3-g2)*u);b=Math.round(b2+(b3-b2)*u);}
  return `rgb(${r},${g},${b})`;
}

let currentCand = 'hurmic';
let markers = [];

const map = L.map('map', { center:[44.848,-0.582], zoom:13, zoomControl:true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);

function updateLegend(cand) {
  const c = config[cand];
  document.getElementById('legend-title').textContent = '% ' + c.label.split(' ')[1];
  document.getElementById('legend-gradient').style.background = `linear-gradient(to right,${c.color1},${c.color2},${c.color3})`;
  document.getElementById('leg-max').textContent = maxPct[cand] + ' %';
}

function updateInfoPanel(b) {
  const panel = document.getElementById('info-panel');
  if (!b) { panel.innerHTML=`<div class="info-panel-title">Centre de vote</div><div class="info-placeholder">Survolez un point</div>`; return; }

  const rows = Object.keys(config).map(k=>({key:k,label:config[k].label.split(' ')[1],pct:b[k+'_pct'],votes:b[k]}))
    .sort((a,z)=>z.pct-a.pct);

  const part = b.participation > 0
    ? `<div class="info-stat"><span>Participation</span><strong>${b.participation}%</strong></div>`
    : `<div class="info-stat"><span>Participation</span><strong>n.d.</strong></div>`;

  panel.innerHTML = `
    <div class="info-panel-title">${b.nom}</div>
    ${rows.map(r=>`
      <div class="info-cand-row">
        <div class="info-cand-name">${r.label}</div>
        <div class="info-cand-bar-wrap"><div class="info-cand-bar" style="width:${Math.min(100,(r.pct/maxPct[r.key])*100)}%;background:${config[r.key].color3}"></div></div>
        <div class="info-cand-pct" style="color:${config[r.key].text}">${r.pct}%</div>
      </div>`).join('')}
    <hr class="info-divider">
    ${part}
    <div class="info-stat"><span>Exprimés</span><strong>${b.nb_exprimes.toLocaleString('fr')}</strong></div>
  `;
}

function drawMarkers(cand) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  bureaux.forEach(b => {
    const pct = b[cand+'_pct'];
    const color = scoreToColor(pct, cand);
    const radius = 8 + (pct / maxPct[cand]) * 11;
    const circle = L.circleMarker([b.lat,b.lon], {
      radius, fillColor:color, fillOpacity:0.88, color:'#fff', weight:1.5
    }).addTo(map);
    circle.bindTooltip(`<strong>${b.nom}</strong>&nbsp; ${pct}%`, {className:'ctip',direction:'top',offset:[0,-radius-2]});
    circle.on('mouseover', function(){ this.setStyle({weight:2.5,color:'#333'}); updateInfoPanel(b); });
    circle.on('mouseout',  function(){ this.setStyle({weight:1.5,color:'#fff'}); updateInfoPanel(null); });
    markers.push(circle);
  });
  updateLegend(cand);
}

document.querySelectorAll('.cand-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cand-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentCand = btn.dataset.cand;
    drawMarkers(currentCand);
  });
});

drawMarkers('hurmic');
});
</script>
</body>
